<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #111;
      padding: 48px 24px;
    }

    header {
      max-width: 800px;
      margin: 0 auto 48px;
    }

    header h1 { font-size: 2rem; margin-bottom: 8px; }
    header p { color: #555; font-size: 1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.15s;
    }

    .card:hover { transform: translateY(-3px); }

    .card-preview {
      width: 100%;
      height: 180px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #aaa;
    }

    .card-body { padding: 16px; }
    .card-body h2 { font-size: 1rem; margin-bottom: 4px; }
    .card-body p { font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>

  <header>
    <h1>Wishlist App</h1>
    <p>An app to help you organize and share your most wanted items.</p>
  </header>

  <div class="grid">

    <a class="card" href="v01.html">
      <div class="card-preview">v01</div>
      <div class="card-body">
        <h2>v01 — Minimal Pastel</h2>
        <p>Clean, soft, friendly starting point.</p>
      </div>
    </a>

    <a class="card" href="v02.html">
      <div class="card-preview">v02</div>
      <div class="card-body">
        <h2>v02 — Magazine Editorial</h2>
        <p>Bold headlines, asymmetric grid.</p>
      </div>
    </a>

    <!-- Add more cards here as you build versions -->

  </div>

</body>
</html>
